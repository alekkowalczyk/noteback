<!DOCTYPE html>
<!--
  Noteback — popup.html  (toolbar popup; scaffold)

  Responsibility: the toolbar popup UI. Buttons:
    - Toggle sidebar
    - Copy as Markdown
    - Save as HTML canvas
  Plus the onboarding card (file-URL access; localhost note) per spec §9, which
  popup.js fills into #nb-onboarding when "Allow access to file URLs" is OFF.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noteback</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="nb-popup__header">
    <h1 class="nb-popup__title">Noteback</h1>
    <div class="nb-popup__head-ctrls">
      <button id="nb-info-btn" type="button" class="nb-gear" aria-label="About Noteback" aria-expanded="false">ⓘ</button>
      <button id="nb-gear" type="button" class="nb-gear" aria-label="Settings" aria-expanded="false">⚙︎</button>
    </div>
  </header>

  <main class="nb-popup__body">
    <button id="nb-toggle-sidebar" type="button" class="nb-btn">
      Toggle sidebar
    </button>
    <div class="nb-copy-wrap">
      <button id="nb-copy-markdown" type="button" class="nb-btn nb-copy-main">
        Copy feedback
      </button>
      <button id="nb-copy-caret" type="button" class="nb-btn nb-copy-caret"
              aria-haspopup="menu" aria-expanded="false" aria-label="More copy options">
        <span class="nb-caret" aria-hidden="true">▾</span>
      </button>
      <div id="nb-copy-menu" class="nb-copy-menu" role="menu" aria-label="Copy options" hidden>
        <button type="button" class="nb-menu-item" data-copy="canvas" role="menuitem">Copy html (with feedback)</button>
        <button type="button" class="nb-menu-item" data-copy="clean" role="menuitem">Copy html (clean)</button>
      </div>
    </div>
    <div class="nb-save-wrap">
      <button id="nb-save-btn" type="button" class="nb-btn nb-save-btn"
              aria-haspopup="menu" aria-expanded="false">
        Save<span class="nb-caret" aria-hidden="true">▾</span>
      </button>
      <div id="nb-save-menu" class="nb-save-menu" role="menu" aria-label="Save options" hidden>
        <button type="button" class="nb-menu-item" data-save="comments" role="menuitem">HTML · with comments</button>
        <button type="button" class="nb-menu-item" data-save="clean" role="menuitem">HTML · clean copy</button>
        <button type="button" class="nb-menu-item" data-save="pdf" role="menuitem">PDF/Print</button>
      </div>
    </div>

    <div id="nb-site-row" class="nb-site-row" hidden>
      <span class="nb-site-label">Active on <code id="nb-site-origin"></code></span>
      <label class="nb-switch">
        <input id="nb-site-toggle" type="checkbox" />
        <span class="nb-switch__slider"></span>
      </label>
      <button id="nb-site-enable-all" type="button" class="nb-site-enable-all" hidden></button>
    </div>
  </main>

  <section id="nb-settings" class="nb-popup__settings" hidden>
    <div class="nb-settings__title">Run Noteback on…</div>
    <label class="nb-setting-row"><span>file://</span>
      <span class="nb-switch"><input id="nb-type-file" type="checkbox" /><span class="nb-switch__slider"></span></span>
    </label>
    <label class="nb-setting-row"><span>localhost</span>
      <span class="nb-switch"><input id="nb-type-localhost" type="checkbox" /><span class="nb-switch__slider"></span></span>
    </label>
    <label class="nb-setting-row"><span>127.0.0.1</span>
      <span class="nb-switch"><input id="nb-type-127" type="checkbox" /><span class="nb-switch__slider"></span></span>
    </label>
    <div id="nb-hist-block" hidden>
      <div class="nb-settings__title nb-settings__title--hist">Version history</div>
      <label class="nb-setting-row"><span>Record history</span>
        <span class="nb-switch"><input id="nb-hist-global" type="checkbox" /><span class="nb-switch__slider"></span></span>
      </label>
      <label class="nb-setting-row" id="nb-hist-site-row"><span>On this site <code id="nb-hist-site-origin"></code></span>
        <span class="nb-switch"><input id="nb-hist-site" type="checkbox" /><span class="nb-switch__slider"></span></span>
      </label>
      <label class="nb-setting-row" id="nb-hist-doc-row"><span>On this page</span>
        <span class="nb-switch"><input id="nb-hist-doc" type="checkbox" /><span class="nb-switch__slider"></span></span>
      </label>
      <p id="nb-hist-hint" class="nb-hist-hint" hidden></p>
    </div>
  </section>

  <section id="nb-info" class="nb-popup__info" hidden>
    <p class="nb-info-note">Noteback also ships as an agent skill + CLI, so an AI (Claude Code, etc.) can give you HTML that is already annotatable.</p>
    <div class="nb-cmd"><code>npx skills add alekkowalczyk/noteback</code>
      <button type="button" class="nb-cmd-copy" data-cmd="npx skills add alekkowalczyk/noteback" title="Copy command">Copy</button></div>
    <div class="nb-cmd"><code>npx noteback install-skill</code>
      <button type="button" class="nb-cmd-copy" data-cmd="npx noteback install-skill" title="Copy command">Copy</button></div>
    <a class="nb-info-link" href="https://github.com/alekkowalczyk/noteback" target="_blank" rel="noopener noreferrer">View the project on GitHub ↗</a>
  </section>

  <section id="nb-onboarding" class="nb-popup__onboarding" hidden>
    <!-- Filled by popup.js when "Allow access to file URLs" is disabled. -->
  </section>

  <footer class="nb-popup__footer">
    <span id="nb-status" class="nb-popup__status"></span>
  </footer>

  <script src="../content/origin-policy.js"></script>
  <script src="popup.js"></script>
</body>
</html>
