<!DOCTYPE html>
<!--
  Noteback — popup.html  (toolbar popup; scaffold)

  Responsibility: the toolbar popup UI. Buttons:
    - Toggle sidebar
    - Copy as Markdown
    - Save as HTML canvas
  Plus the onboarding card (file-URL access; localhost note) per spec §9, which
  popup.js fills into #nb-onboarding when "Allow access to file URLs" is OFF.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noteback</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="nb-popup__header">
    <h1 class="nb-popup__title">Noteback</h1>
  </header>

  <main class="nb-popup__body">
    <button id="nb-toggle-sidebar" type="button" class="nb-btn">
      Toggle sidebar
    </button>
    <button id="nb-copy-markdown" type="button" class="nb-btn">
      Copy feedback as markdown
    </button>
    <div class="nb-save-wrap">
      <button id="nb-save-btn" type="button" class="nb-btn nb-save-btn"
              aria-haspopup="menu" aria-expanded="false">
        Save<span class="nb-caret" aria-hidden="true">▾</span>
      </button>
      <div id="nb-save-menu" class="nb-save-menu" role="menu" aria-label="Save options" hidden>
        <button type="button" class="nb-menu-item" data-save="comments" role="menuitem">HTML · with comments</button>
        <button type="button" class="nb-menu-item" data-save="clean" role="menuitem">HTML · clean copy</button>
        <button type="button" class="nb-menu-item" data-save="pdf" role="menuitem">PDF/Print</button>
      </div>
    </div>
  </main>

  <section id="nb-onboarding" class="nb-popup__onboarding" hidden>
    <!-- Filled by popup.js when "Allow access to file URLs" is disabled. -->
  </section>

  <footer class="nb-popup__footer">
    <span id="nb-status" class="nb-popup__status"></span>
  </footer>

  <script src="../content/origin-policy.js"></script>
  <script src="popup.js"></script>
</body>
</html>
